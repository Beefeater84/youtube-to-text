name: Deploy to VPS

on:
  # Disabled until infrastructure is ready. Re-enable by uncommenting triggers below.
  # push:
  #   branches:
  #     - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  REPOSITORY: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [web, worker]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set build variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail
          IMAGE_BASE="${REGISTRY}/${REPOSITORY}-${{ matrix.service }}"
          IMAGE_BASE="$(echo "${IMAGE_BASE}" | tr '[:upper:]' '[:lower:]')"
          echo "image=${IMAGE_BASE}" >> "${GITHUB_OUTPUT}"
          echo "dockerfile=deploy/docker/${{ matrix.service }}.Dockerfile" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ steps.vars.outputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ github.sha }}
            ${{ steps.vars.outputs.image }}:latest
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
            NEXT_PUBLIC_SITE_URL=https://yt-reader.com

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          source: "deploy"
          target: "${{ secrets.VPS_DEPLOY_PATH }}"

      - name: Deploy on VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          envs: DEPLOY_ENV_FILE
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            # Optional env update from secret
            if [ -n "${DEPLOY_ENV_FILE:-}" ]; then
              printf '%s\n' "$DEPLOY_ENV_FILE" > .env
              # Fix potential Windows line endings (\r)
              sed -i 's/\r$//' .env
            fi

            docker compose --env-file .env -f deploy/docker-compose.prod.yml pull
            docker compose --env-file .env -f deploy/docker-compose.prod.yml up -d --remove-orphans
            bash deploy/scripts/smoke-check.sh

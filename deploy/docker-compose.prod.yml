services:
  reverse-proxy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-yt-reader.com}
      - HTTP_PORT=${HTTP_PORT:-80}
      - HTTPS_PORT=${HTTPS_PORT:-443}
    networks:
      - app-net

  web:
    image: "${WEB_IMAGE}:${WEB_IMAGE_TAG}"
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_SITE_URL: https://${APP_DOMAIN:-yt-reader.com}
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - app-net

  worker:
    image: "${WORKER_IMAGE}:${WORKER_IMAGE_TAG}"
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SENTRY_DSN: "${SENTRY_DSN_WORKER}"
      YOUTUBE_COOKIES_CONTENT: "${YOUTUBE_COOKIES_CONTENT}"
      YOUTUBE_COOKIES_FILE: "/app/youtube_cookies.txt"
    volumes:
      - ../youtube_cookies.txt:/app/youtube_cookies.txt:ro
    command: sh -c "${WORKER_COMMAND:-python -m src.main}"
    networks:
      - app-net

volumes:
  caddy_data:
  caddy_config:

networks:
  app-net:
